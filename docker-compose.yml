version: '3.8'

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080" # Panel de Traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portaineryumbo.byronm.com`)"
      - "traefik.http.routers.portainer.entrypoints=web"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  frontend:
    build: ./project-devops-front
    container_name: angular_frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`yumbo.byronm.com`)"
      - "traefik.http.routers.frontend.entrypoints=web"

  backend:
    build: ./project-devops-back
    container_name: laravel_backend
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: projectdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`backyumbo.byronm.com`)"
      - "traefik.http.routers.backend.entrypoints=web"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: projectdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgyumbo.byronm.com`)"
      - "traefik.http.routers.pgadmin.entrypoints=web"

volumes:
  portainer_data:
  postgres_data:
