version: '3.8'

services:
  traefik:
    image: traefik:v2.11
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints para tráfico normal (80) y seguro (443)
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Configuración del generador automático de certificados (Let's Encrypt)
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=tu-correo@gmail.com" # 👈 PON TU CORREO REAL AQUÍ
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - proxy-net

  frontend:
    build: ./project-devops-front
    container_name: angular_frontend
    labels:
      - "traefik.enable=true"
      # Enrutador Seguro (HTTPS)
      - "traefik.http.routers.frontend.rule=Host(`yumbo.byronrm.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=myresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # Redirección Automática de HTTP a HTTPS
      - "traefik.http.routers.frontend-http.rule=Host(`yumbo.byronrm.com`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=redirect-to-https"
      # Middleware global de redirección
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - proxy-net

  backend:
    build: ./project-devops-back
    container_name: laravel_backend
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: projectdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    labels:
      - "traefik.enable=true"
      # Enrutador Seguro (HTTPS)
      - "traefik.http.routers.backend.rule=Host(`backyumbo.byronrm.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=myresolver"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      # Redirección Automática de HTTP a HTTPS
      - "traefik.http.routers.backend-http.rule=Host(`backyumbo.byronrm.com`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=redirect-to-https"
    depends_on:
      - db
    networks:
      - proxy-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    labels:
      - "traefik.enable=true"
      # Enrutador Seguro (HTTPS)
      - "traefik.http.routers.portainer.rule=Host(`portaineryumbo.byronrm.com`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=myresolver"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      # Redirección Automática de HTTP a HTTPS
      - "traefik.http.routers.portainer-http.rule=Host(`portaineryumbo.byronrm.com`)"
      - "traefik.http.routers.portainer-http.entrypoints=web"
      - "traefik.http.routers.portainer-http.middlewares=redirect-to-https"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - proxy-net

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: projectdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    labels:
      - "traefik.enable=true"
      # Enrutador Seguro (HTTPS)
      - "traefik.http.routers.pgadmin.rule=Host(`pgyumbo.byronrm.com`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls=true"
      - "traefik.http.routers.pgadmin.tls.certresolver=myresolver"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
      # Redirección Automática de HTTP a HTTPS
      - "traefik.http.routers.pgadmin-http.rule=Host(`pgyumbo.byronrm.com`)"
      - "traefik.http.routers.pgadmin-http.entrypoints=web"
      - "traefik.http.routers.pgadmin-http.middlewares=redirect-to-https"
    networks:
      - proxy-net

volumes:
  portainer_data:
  postgres_data:

networks:
  proxy-net:
    driver: bridge