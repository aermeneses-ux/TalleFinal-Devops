name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          script: |
            cd /root/proyecto
            
            # 1. Descargamos los últimos cambios de GitHub sin intentar fusionarlos todavía
            git fetch origin main
            
            # 2. Forzamos a la VPS a alinearse exactamente con lo que hay en GitHub,
            # descartando cualquier cambio o conflicto local en el servidor
            git reset --hard origin/main
            
            # 3. Detenemos los contenedores antiguos
            docker-compose down
            
            # 4. Construimos e iniciamos los contenedores con los nuevos cambios
            docker-compose up -d --build